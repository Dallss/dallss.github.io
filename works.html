<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Works · Randall Alquicer</title>

  <script type="module" src="./static/load-data.js?v=2" defer></script>
  <script type="module" src="./static/filter.js" defer></script>
  <script src="./static/theme.js" defer></script>

  <link rel="stylesheet" href="./static/styles.css?v=9">
  <link rel="stylesheet" href="./static/tablet.css?v=2">
  <link rel="stylesheet" href="./static/mobile.css?v=2">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>

  <div id="main-content">
    <header class="site-header" aria-label="Site">
      <a class="site-mark" href="./index.html">Randall Alquicer</a>
    
      <div class="header-right">
        <nav class="site-nav" aria-label="Primary">
          <a href="./index.html#aboutme">About</a>
          <a href="https://github.com/Dallss" target="_blank">GitHub</a>
          <span class="site-nav-current">Works</span>
        </nav>
    
        <button id="theme-toggle" aria-label="Toggle theme">☼</button>
      </div>
    </header>

    <main class="site-main works-page-main">
      <p class="back-link-wrap">
        <a class="text-link" href="./index.html">← Home</a>
      </p>

      <section class="works-page-section" aria-labelledby="works-heading">
        <h1 id="works-heading" class="page-title">Works <span class="section-arrow">↘</span></h1>
        <p class="page-lede">Filter by tags or search the stack you care about.</p>

        <div class="projects-filter-strip" aria-label="Project filters">
          <span class="filter-title">Filter</span>
          <div class="search-box">
            <input
              type="text"
              id="filter-input"
              placeholder="Search tags…"
              oninput="showDropdown()"
              onfocus="showDropdown()"
              autocomplete="off"
            />
            <div class="dropdown" id="dropdown"></div>
          </div>
          <div id="selected-tags" class="selected-tags"></div>
        </div>
        <div class="projects-grid" id="projects-grid"></div>
      </section>

      <footer class="footer">
        <p class="footer-links">
          <a href="./index.html">Home</a>
          <span class="footer-sep"> · </span>
          <a href="mailto:raalquicer@up.edu.ph">Email</a>
        </p>
      </footer>
    </main>
  </div>
</body>
</html>
